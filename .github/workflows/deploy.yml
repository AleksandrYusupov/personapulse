name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0861208488
  PROJECT_NUMBER: "875611365906"
  REGION: us-central1
  SERVICE: personapulse
  IMAGE_MCP_SERVICE: personapulse-image-mcp
  MIGRATION_JOB: personapulse-migrate
  SEED_JOB: personapulse-seed
  ARTIFACT_REPOSITORY: personapulse
  RUNTIME_SERVICE_ACCOUNT: personapulse-runtime@gen-lang-client-0861208488.iam.gserviceaccount.com
  IMAGE: us-central1-docker.pkg.dev/gen-lang-client-0861208488/personapulse/personapulse:${{ github.sha }}
  FRONTEND_ORIGIN: https://personapulse-gwvyscuxeq-uc.a.run.app

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/875611365906/locations/global/workloadIdentityPools/github-actions/providers/personapulse
          service_account: personapulse-deploy@gen-lang-client-0861208488.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: docker build --pull --tag "${IMAGE}" .

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Deploy migration job
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --command=node \
            --args=dist-server/migrate.mjs \
            --set-env-vars=NODE_ENV=production,SUPABASE_SCHEMA=inception-1-test \
            --set-secrets=SUPABASE_DATABASE_URL=personapulse-supabase-database-url:latest \
            --max-retries=0 \
            --task-timeout=300 \
            --quiet

      - name: Run migrations
        run: |
          gcloud run jobs execute "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Deploy seed job
        run: |
          gcloud run jobs deploy "${SEED_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --command=node \
            --args=dist-server/seed.mjs \
            --set-env-vars=NODE_ENV=production,SUPABASE_SCHEMA=inception-1-test,MEDIA_BUCKET=personapulse-media \
            --set-secrets=SUPABASE_URL=personapulse-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=personapulse-supabase-service-role-key:latest,SUPABASE_DATABASE_URL=personapulse-supabase-database-url:latest \
            --max-retries=0 \
            --task-timeout=300 \
            --quiet

      - name: Run seed
        run: |
          gcloud run jobs execute "${SEED_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Deploy private image MCP service
        run: |
          gcloud run deploy "${IMAGE_MCP_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --no-allow-unauthenticated \
            --cpu=1 \
            --memory=1Gi \
            --min-instances=0 \
            --max-instances=2 \
            --concurrency=4 \
            --timeout=300 \
            --no-cpu-throttling \
            --set-env-vars=NODE_ENV=production,PROCESS_ROLE=image-mcp,SUPABASE_SCHEMA=inception-1-test,MEDIA_BUCKET=personapulse-media \
            --set-secrets=SUPABASE_URL=personapulse-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=personapulse-supabase-service-role-key:latest,SUPABASE_DATABASE_URL=personapulse-supabase-database-url:latest,GEMINI_API_KEY=personapulse-gemini-api-key:latest,IMAGE_MCP_CONTEXT_SIGNING_SECRET=personapulse-image-mcp-context-signing-secret:latest \
            --quiet

      - name: Resolve image MCP service URL
        id: image_mcp_url
        run: |
          set -euo pipefail
          url="$(gcloud run services describe "${IMAGE_MCP_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Grant main service image MCP invoke access
        run: |
          gcloud run services add-iam-policy-binding "${IMAGE_MCP_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT}" \
            --role="roles/run.invoker" \
            --quiet

      - name: Deploy service
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: personapulse
          region: us-central1
          project_id: gen-lang-client-0861208488
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --cpu=1
            --memory=1Gi
            --min-instances=1
            --max-instances=1
            --concurrency=20
            --timeout=300
            --no-cpu-throttling
            --set-env-vars=NODE_ENV=production,PROCESS_ROLE=all,SUPABASE_SCHEMA=inception-1-test,MEDIA_BUCKET=personapulse-media,FRONTEND_ORIGIN=${{ env.FRONTEND_ORIGIN }},IMAGE_MCP_URL=${{ steps.image_mcp_url.outputs.url }}/mcp,IMAGE_MCP_AUDIENCE=${{ steps.image_mcp_url.outputs.url }},AGENT_MULTIMODAL_IMAGE_LIMIT=6,AGENT_MULTIMODAL_IMAGE_BYTE_BUDGET=12582912,SILENCE_NORMAL_MIN_SECONDS=5,SILENCE_NORMAL_MAX_SECONDS=10,SILENCE_DEFAULT_SECONDS=7,SILENCE_IGNORED_PAUSE_SECONDS=180,SILENCE_ABSOLUTE_MAX_SECONDS=300
            --set-secrets=SUPABASE_URL=personapulse-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=personapulse-supabase-service-role-key:latest,SUPABASE_DATABASE_URL=personapulse-supabase-database-url:latest,GEMINI_API_KEY=personapulse-gemini-api-key:latest,ADMIN_API_TOKEN=personapulse-admin-api-token:latest,SESSION_SECRET_PEPPER=personapulse-session-secret-pepper:latest,IMAGE_MCP_CONTEXT_SIGNING_SECRET=personapulse-image-mcp-context-signing-secret:latest

      - name: Verify health
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${{ steps.deploy.outputs.url }}/api/v1/health" | tee /tmp/personapulse-health.json
          grep -q '"schema":"inception-1-test"' /tmp/personapulse-health.json
