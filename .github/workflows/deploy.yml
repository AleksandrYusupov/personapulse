name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0861208488
  PROJECT_NUMBER: "875611365906"
  REGION: us-central1
  SERVICE: personapulse
  MIGRATION_JOB: personapulse-migrate
  ARTIFACT_REPOSITORY: personapulse
  RUNTIME_SERVICE_ACCOUNT: personapulse-runtime@gen-lang-client-0861208488.iam.gserviceaccount.com
  IMAGE: us-central1-docker.pkg.dev/gen-lang-client-0861208488/personapulse/personapulse:${{ github.sha }}
  FRONTEND_ORIGIN: https://personapulse-875611365906.us-central1.run.app

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/875611365906/locations/global/workloadIdentityPools/github-actions/providers/personapulse
          service_account: personapulse-deploy@gen-lang-client-0861208488.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: docker build --pull --tag "${IMAGE}" .

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Resolve Secret Manager versions
        id: secrets
        run: |
          set -euo pipefail
          resolve_version() {
            local output_name="$1"
            local secret_name="$2"
            local version
            version="$(gcloud secrets versions list "${secret_name}" \
              --project="${PROJECT_ID}" \
              --filter='state:ENABLED' \
              --limit=1 \
              --format='value(name)')"
            if [ -z "${version}" ]; then
              echo "No enabled version found for ${secret_name}" >&2
              exit 1
            fi
            version="${version##*/}"
            echo "${output_name}=${version}" >> "${GITHUB_OUTPUT}"
          }

          resolve_version supabase_url personapulse-supabase-url
          resolve_version supabase_service_role_key personapulse-supabase-service-role-key
          resolve_version supabase_database_url personapulse-supabase-database-url
          resolve_version gemini_api_key personapulse-gemini-api-key
          resolve_version admin_api_token personapulse-admin-api-token
          resolve_version session_secret_pepper personapulse-session-secret-pepper

      - name: Deploy migration job
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --command=node \
            --args=dist-server/migrate.mjs \
            --set-env-vars=NODE_ENV=production,SUPABASE_SCHEMA=inception-1-test \
            --set-secrets=SUPABASE_DATABASE_URL=personapulse-supabase-database-url:${{ steps.secrets.outputs.supabase_database_url }} \
            --max-retries=0 \
            --task-timeout=300 \
            --quiet

      - name: Run migrations
        run: |
          gcloud run jobs execute "${MIGRATION_JOB}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Deploy service
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: personapulse
          region: us-central1
          project_id: gen-lang-client-0861208488
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --cpu=1
            --memory=1Gi
            --min-instances=1
            --max-instances=1
            --concurrency=20
            --timeout=300
            --no-cpu-throttling
            --set-env-vars=NODE_ENV=production,PROCESS_ROLE=all,SUPABASE_SCHEMA=inception-1-test,MEDIA_BUCKET=personapulse-media,FRONTEND_ORIGIN=${{ env.FRONTEND_ORIGIN }}
            --set-secrets=SUPABASE_URL=personapulse-supabase-url:${{ steps.secrets.outputs.supabase_url }},SUPABASE_SERVICE_ROLE_KEY=personapulse-supabase-service-role-key:${{ steps.secrets.outputs.supabase_service_role_key }},SUPABASE_DATABASE_URL=personapulse-supabase-database-url:${{ steps.secrets.outputs.supabase_database_url }},GEMINI_API_KEY=personapulse-gemini-api-key:${{ steps.secrets.outputs.gemini_api_key }},ADMIN_API_TOKEN=personapulse-admin-api-token:${{ steps.secrets.outputs.admin_api_token }},SESSION_SECRET_PEPPER=personapulse-session-secret-pepper:${{ steps.secrets.outputs.session_secret_pepper }}

      - name: Verify health
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${{ steps.deploy.outputs.url }}/api/v1/health" | tee /tmp/personapulse-health.json
          grep -q '"schema":"inception-1-test"' /tmp/personapulse-health.json
